<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVBR.info - Monitoramento e Diagnóstico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; overflow-x: hidden; }
        .card { background-color: #111827; border: 1px solid #1f2937; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .portal-carousel, .products-carousel { display: flex; flex-direction: row; flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; gap: 1rem; padding-bottom: 1rem; width: 100%; -webkit-overflow-scrolling: touch; }
        .portal-carousel::-webkit-scrollbar, .products-carousel::-webkit-scrollbar { height: 6px; }
        .portal-carousel::-webkit-scrollbar-thumb, .products-carousel::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        .state-btn { background-color: #1f2937; border: 1px solid #374151; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .state-btn:hover { background-color: #2563eb; border-color: #3b82f6; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
        .ticker-wrap { width: 100%; overflow: hidden; background-color: #060911; border-bottom: 1px solid #1e293b; padding: 12px 0; }
        .ticker { display: inline-flex; white-space: nowrap; padding-left: 100%; animation: ticker 50s linear infinite; }
        .ticker:hover { animation-play-state: paused; }
        .ticker-item { padding: 0 3rem; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 0.6rem; color: #94a3b8; border-right: 1px solid #1e293b; }
    </style>
</head>
<body>

    <!-- Ticker de Avisos Mantido -->
    <div class="ticker-wrap"><div class="ticker">
        <div class="ticker-item flex items-center"><strong class="text-red-400 mr-1">[ALERTA]</strong> TRT9 (PR) instável.</div>
        <div class="ticker-item flex items-center"><strong class="text-amber-400 mr-1">TJPR:</strong> Manutenção sábado.</div>
    </div></div>

    <div class="p-4 md:p-8 max-w-7xl mx-auto space-y-12">
        <header class="border-b border-gray-800 pb-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500">ADVBR<span class="text-white">.info</span></h1>
            <button onclick="abrirReportar()" class="bg-gray-900 border border-gray-800 text-gray-300 text-sm px-4 py-2 rounded-xl">Estou com problema!</button>
        </header>

        <!-- GRADE EDITADA: Apenas 3 botões foco -->
        <section>
            <h2 class="text-lg font-semibold mb-4 text-gray-300">Centrais de Monitoramento</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div onclick="abrirEstado('PR')" class="state-btn p-4 rounded-xl font-bold text-lg shadow-sm">Paraná (PR) <span id="dot-PR" class="h-3 w-3 rounded-full bg-gray-600 inline-block ml-1"></span></div>
                <div onclick="abrirEstado('coletivos')" class="state-btn p-4 rounded-xl font-bold text-lg shadow-sm">Sistemas Nacionais <span id="dot-coletivos" class="h-3 w-3 rounded-full bg-gray-600 inline-block ml-1"></span></div>
                <div onclick="abrirEstado('nacionais')" class="state-btn p-4 rounded-xl font-bold text-lg shadow-sm">Tribunais Superiores <span id="dot-nacionais" class="h-3 w-3 rounded-full bg-gray-600 inline-block ml-1"></span></div>
            </div>
        </section>

        <!-- SEÇÕES MANTIDAS INTEGRALMENTE -->
        <section class="grid md:grid-cols-2 gap-6">
            <div class="p-6 card rounded-2xl">
                <h2 class="text-lg font-bold">Otimizador PDF</h2>
                <button class="bg-blue-600 w-full py-3 rounded-xl mt-4">Editar PDF</button>
            </div>
            <div class="p-6 card rounded-2xl text-center">
                <h2 class="text-lg font-bold">Diagnóstico Token / PJe</h2>
                <div class="flex gap-2 mt-4">
                    <button class="bg-blue-600 flex-1 py-3 rounded-xl">Teste Token</button>
                    <button class="bg-blue-600 flex-1 py-3 rounded-xl">PJe Office</button>
                </div>
            </div>
        </section>

        <!-- SEÇÃO DE PRODUTOS (MANTIDA) -->
        <section>
            <div class="products-carousel">
                <!-- Seus 10 produtos (Coloque aqui o HTML original dos seus produtos) -->
            </div>
        </section>
    </div>

    <script>
        // Mantenha aqui todo o seu JavaScript original para não quebrar a lógica
        function abrirEstado(uf) {
            document.getElementById('estadoNome').innerText = uf;
            renderizarConteudoModal(uf);
            document.getElementById('modalEstado').classList.remove('hidden');
        }
        // ... (resto do seu script)
    </script>
</body>
</html>
